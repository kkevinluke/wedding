<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Turner</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: radial-gradient(circle at center, #3d2b1f 0%, #1a120d 60%, #0b0705 100%);
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .book-wrap {
      width: min(92vw, 430px);
      height: min(88vh, 760px);
      perspective: 2200px;
      position: relative;
    }

    .book-shadow {
      position: absolute;
      inset: auto 8% 2% 8%;
      height: 18px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      filter: blur(14px);
      z-index: 0;
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      z-index: 1;
    }

    .page {
      position: absolute;
      inset: 0;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.95s cubic-bezier(0.22, 0.8, 0.2, 1), z-index 0.3s;
      border-radius: 18px;
      overflow: visible;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(0,0,0,0.18), rgba(255,255,255,0.02) 12%, rgba(255,255,255,0) 30%);
      pointer-events: none;
      z-index: 5;
    }

    .page-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
      background: #f8f1e7;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 30px rgba(0,0,0,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
    }

    .page-back {
      transform: rotateY(180deg);
      background: #eadbc8;
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .page.dragging {
      transition: none;
    }

    .greeting {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.28);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0.9;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .controls {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 25;
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.14);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.22);
    }

    .page-count {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 25;
      background: rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 600px) {
      .book-wrap {
        width: 94vw;
        height: 78vh;
      }

      .greeting, .hint, .page-count, button {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="greeting">Welcome, swipe left to turn the page, swipe right to go back</div>
    <div class="page-count" id="pageCount">Page 1 of 4</div>
    <div class="controls">
      <button id="musicBtn">Pause music</button>
    </div>
    <div class="book-wrap" id="bookWrap">
      <div class="book-shadow"></div>
      <div class="book" id="book"></div>
    </div>
    <div class="hint">Swipe anywhere on the book</div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const pagesData = [
      { image: 'images/page1.jpg', label: 'Page 1' },
      { image: 'images/page2.jpg', label: 'Page 2' },
      { image: 'images/page3.jpg', label: 'Page 3' },
      { image: 'images/page4.jpg', label: 'Page 4' }
    ];

    const book = document.getElementById('book');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const bookWrap = document.getElementById('bookWrap');

    let currentPage = 0;
    let startX = 0;
    let currentX = 0;
    let draggingPage = null;
    let dragMode = null;
    let isDragging = false;

    function buildBook() {
      book.innerHTML = '';

      pagesData.forEach((page, index) => {
        const pageEl = document.createElement('div');
        pageEl.className = 'page';
        pageEl.dataset.index = index;
        pageEl.style.zIndex = pagesData.length - index;

        const front = document.createElement('div');
        front.className = 'page-face page-front';
        front.innerHTML = `<img src="${page.image}" alt="${page.label}" />`;

        const back = document.createElement('div');
        back.className = 'page-face page-back';
        const backImage = index + 1 < pagesData.length ? pagesData[index + 1].image : page.image;
        back.innerHTML = `<img src="${backImage}" alt="Back of ${page.label}" />`;

        pageEl.appendChild(front);
        pageEl.appendChild(back);
        book.appendChild(pageEl);
      });

      updateBook();
    }

    function updateBook() {
      const pages = [...document.querySelectorAll('.page')];
      pages.forEach((page, index) => {
        page.classList.toggle('flipped', index < currentPage);
        page.style.zIndex = index < currentPage ? index + 1 : pagesData.length - index;
      });
      pageCount.textContent = `Page ${Math.min(currentPage + 1, pagesData.length)} of ${pagesData.length}`;
      if (currentPage >= pagesData.length) {
        pageCount.textContent = `Page ${pagesData.length} of ${pagesData.length}`;
      }
    }

    function nextPage() {
      if (currentPage < pagesData.length) {
        currentPage += 1;
        updateBook();
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage -= 1;
        updateBook();
      }
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function getPageForDrag(direction) {
      const pages = [...document.querySelectorAll('.page')];
      if (direction === 'next' && currentPage < pagesData.length) {
        return pages[currentPage];
      }
      if (direction === 'prev' && currentPage > 0) {
        return pages[currentPage - 1];
      }
      return null;
    }

    function onPointerDown(e) {
      tryStartMusic();
      startX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      currentX = startX;
      isDragging = true;
      draggingPage = null;
      dragMode = null;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      currentX = e.clientX ?? e.touches?.[0]?.clientX ?? currentX;
      const deltaX = currentX - startX;

      if (!dragMode) {
        if (deltaX < -12 && currentPage < pagesData.length) {
          dragMode = 'next';
          draggingPage = getPageForDrag('next');
        } else if (deltaX > 12 && currentPage > 0) {
          dragMode = 'prev';
          draggingPage = getPageForDrag('prev');
        } else {
          return;
        }

        if (draggingPage) {
          draggingPage.classList.add('dragging');
        }
      }

      if (!draggingPage) return;

      let progress;
      if (dragMode === 'next') {
        progress = Math.min(Math.max((-deltaX) / bookWrap.clientWidth, 0), 1);
        const angle = -180 * progress;
        draggingPage.style.transform = `rotateY(${angle}deg)`;
      } else {
        progress = Math.min(Math.max(1 - (deltaX / bookWrap.clientWidth), 0), 1);
        const angle = -180 * progress;
        draggingPage.style.transform = `rotateY(${angle}deg)`;
      }
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = Math.max(60, bookWrap.clientWidth * 0.18);

      if (draggingPage) {
        draggingPage.classList.remove('dragging');
        draggingPage.style.transform = '';
      }

      if (deltaX < -threshold) {
        nextPage();
      } else if (deltaX > threshold) {
        prevPage();
      } else {
        updateBook();
      }

      draggingPage = null;
      dragMode = null;
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    ['pointerdown'].forEach(evt => bookWrap.addEventListener(evt, onPointerDown));
    ['pointermove'].forEach(evt => bookWrap.addEventListener(evt, onPointerMove));
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(evt => bookWrap.addEventListener(evt, onPointerUp));

    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

    buildBook();
  </script>
</body>
</html>
