<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobile Page Viewer</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #120c08;
      font-family: Georgia, serif;
      touch-action: pan-y;
    }

    body {
      color: #fff;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(90, 58, 35, 0.35), transparent 45%),
        linear-gradient(180deg, #2a1c14 0%, #120c08 100%);
    }

    .topbar {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .pill,
    .music-btn {
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1;
    }

    .music-btn {
      cursor: pointer;
    }

    .viewer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(max(64px, env(safe-area-inset-top) + 52px))
        14px
        calc(max(72px, env(safe-area-inset-bottom) + 56px));
    }

    .book-wrap {
      width: min(92vw, 460px);
      height: min(78dvh, 760px);
      perspective: 2200px;
      position: relative;
    }

    .book-shadow {
      position: absolute;
      inset: auto 8% 2% 8%;
      height: 18px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      filter: blur(14px);
      z-index: 0;
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      z-index: 1;
    }

    .page {
      position: absolute;
      inset: 0;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.95s cubic-bezier(0.22, 0.8, 0.2, 1), z-index 0.3s;
      border-radius: 24px;
      overflow: visible;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(90deg, rgba(0,0,0,0.18), rgba(255,255,255,0.02) 12%, rgba(255,255,255,0) 30%);
      pointer-events: none;
      z-index: 5;
    }

    .page-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 24px;
      overflow: hidden;
      background: #f8f1e7;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 30px rgba(0,0,0,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-face img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #f6efe6;
      user-select: none;
      pointer-events: none;
    }

    .page-back {
      transform: rotateY(180deg);
      background: #eadbc8;
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .page.dragging {
      transition: none;
    }

    .bottombar {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 20;
      display: flex;
      justify-content: center;
    }

    .hint {
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 380px) {
      .pill,
      .music-btn,
      .hint {
        font-size: 11px;
        padding: 9px 12px;
      }

      .book-wrap {
        width: 94vw;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="pill" id="pageCount">Page 1 of 5</div>
      <button class="music-btn" id="musicBtn">Pause music</button>
    </div>

    <div class="viewer">
      <div class="book-wrap" id="bookWrap">
        <div class="book-shadow"></div>
        <div class="book" id="book"></div>
      </div>
    </div>

    <div class="bottombar">
      <div class="hint">Swipe anywhere on the page</div>
    </div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const pagesData = [
      { image: 'images/page1.jpg', label: 'Page 1' },
      { image: 'images/page2.jpg', label: 'Page 2' },
      { image: 'images/page3.jpg', label: 'Page 3' },
      { image: 'images/page4.jpg', label: 'Page 4' },
      { image: 'images/page5.jpg', label: 'Page 5' }
    ];

    const book = document.getElementById('book');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const bookWrap = document.getElementById('bookWrap');

    let currentPage = 0;
    let startX = 0;
    let currentX = 0;
    let draggingPage = null;
    let dragMode = null;
    let isDragging = false;

    function buildBook() {
      book.innerHTML = '';

      pagesData.forEach((page, index) => {
        const pageEl = document.createElement('div');
        pageEl.className = 'page';
        pageEl.dataset.index = index;
        pageEl.style.zIndex = pagesData.length - index;

        const front = document.createElement('div');
        front.className = 'page-face page-front';
        front.innerHTML = `<img src="${page.image}" alt="${page.label}" />`;

        const back = document.createElement('div');
        back.className = 'page-face page-back';
        const backImage = index + 1 < pagesData.length ? pagesData[index + 1].image : page.image;
        back.innerHTML = `<img src="${backImage}" alt="Back of ${page.label}" />`;

        pageEl.appendChild(front);
        pageEl.appendChild(back);
        book.appendChild(pageEl);
      });

      updateBook();
    }

    function updateBook() {
      const pages = [...document.querySelectorAll('.page')];
      pages.forEach((page, index) => {
        page.classList.toggle('flipped', index < currentPage);
        page.style.zIndex = index < currentPage ? index + 1 : pagesData.length - index;
      });
      pageCount.textContent = `Page ${Math.min(currentPage + 1, pagesData.length)} of ${pagesData.length}`;
      if (currentPage >= pagesData.length) {
        pageCount.textContent = `Page ${pagesData.length} of ${pagesData.length}`;
      }
    }

    function nextPage() {
      if (currentPage < pagesData.length) {
        currentPage += 1;
        updateBook();
      }
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage -= 1;
        updateBook();
      }
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function getPageForDrag(direction) {
      const pages = [...document.querySelectorAll('.page')];
      if (direction === 'next' && currentPage < pagesData.length) {
        return pages[currentPage];
      }
      if (direction === 'prev' && currentPage > 0) {
        return pages[currentPage - 1];
      }
      return null;
    }

    function onPointerDown(e) {
      tryStartMusic();
      startX = e.clientX ?? 0;
      currentX = startX;
      isDragging = true;
      draggingPage = null;
      dragMode = null;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      currentX = e.clientX ?? currentX;
      const deltaX = currentX - startX;

      if (!dragMode) {
        if (deltaX < -12 && currentPage < pagesData.length) {
          dragMode = 'next';
          draggingPage = getPageForDrag('next');
        } else if (deltaX > 12 && currentPage > 0) {
          dragMode = 'prev';
          draggingPage = getPageForDrag('prev');
        } else {
          return;
        }

        if (draggingPage) {
          draggingPage.classList.add('dragging');
        }
      }

      if (!draggingPage) return;

      let progress;
      if (dragMode === 'next') {
        progress = Math.min(Math.max((-deltaX) / bookWrap.clientWidth, 0), 1);
        const angle = -180 * progress;
        draggingPage.style.transform = `rotateY(${angle}deg)`;
      } else {
        progress = Math.min(Math.max(1 - (deltaX / bookWrap.clientWidth), 0), 1);
        const angle = -180 * progress;
        draggingPage.style.transform = `rotateY(${angle}deg)`;
      }
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = Math.max(60, bookWrap.clientWidth * 0.18);

      if (draggingPage) {
        draggingPage.classList.remove('dragging');
        draggingPage.style.transform = '';
      }

      if (deltaX < -threshold) {
        nextPage();
      } else if (deltaX > threshold) {
        prevPage();
      } else {
        updateBook();
      }

      draggingPage = null;
      dragMode = null;
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    bookWrap.addEventListener('pointerdown', onPointerDown);
    bookWrap.addEventListener('pointermove', onPointerMove);
    bookWrap.addEventListener('pointerup', onPointerUp);
    bookWrap.addEventListener('pointercancel', onPointerUp);
    bookWrap.addEventListener('pointerleave', onPointerUp);

    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

    buildBook();
  </script>
</body>
</html>
