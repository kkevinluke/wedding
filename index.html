<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Turner</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: radial-gradient(circle at center, #3d2b1f 0%, #1a120d 60%, #0b0705 100%);
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .book-wrap {
      position: relative;
      width: min(94vw, 980px);
      height: min(86vh, 720px);
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2200px;
    }

    .book-shadow {
      position: absolute;
      bottom: 2%;
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      height: 22px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.34);
      filter: blur(14px);
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      transition: width 0.72s ease, height 0.72s ease;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .card.turn-next {
      animation: turnNext 0.9s cubic-bezier(0.22, 0.8, 0.2, 1);
    }

    .card.turn-prev {
      animation: turnPrev 0.9s cubic-bezier(0.22, 0.8, 0.2, 1);
    }

    @keyframes turnNext {
      0% { transform: rotateY(0deg) scale(1); }
      45% { transform: rotateY(-88deg) scale(0.985); }
      55% { transform: rotateY(88deg) scale(0.985); }
      100% { transform: rotateY(0deg) scale(1); }
    }

    @keyframes turnPrev {
      0% { transform: rotateY(0deg) scale(1); }
      45% { transform: rotateY(88deg) scale(0.985); }
      55% { transform: rotateY(-88deg) scale(0.985); }
      100% { transform: rotateY(0deg) scale(1); }
    }

    .sheet {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      background: #f2e8db;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
    }

    .sheet.single {
      display: block;
    }

    .sheet.spread {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .sheet.spread::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(90,55,30,0.08), rgba(40,20,8,0.26), rgba(90,55,30,0.08));
      z-index: 3;
    }

    .panel {
      position: relative;
      width: 100%;
      height: 100%;
      background: #f8f1e7;
      overflow: hidden;
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .greeting {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.28);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0.9;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .controls {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 25;
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.14);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.22);
    }

    .page-count {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 25;
      background: rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 780px) {
      .book-wrap {
        width: 95vw;
        height: 74vh;
      }

      .greeting, .hint, .page-count, button {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="greeting">Welcome, swipe left for next, swipe right for previous</div>
    <div class="page-count" id="pageCount">Page 1</div>
    <div class="controls">
      <button id="musicBtn">Pause music</button>
    </div>
    <div class="book-wrap" id="bookWrap">
      <div class="book-shadow"></div>
      <div class="stage" id="stage"></div>
    </div>
    <div class="hint">Page 1, then pages 2 and 3, then page 4</div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const views = [
      {
        label: 'Page 1',
        mode: 'single',
        width: 'min(46vw, 460px)',
        height: 'min(82vh, 680px)',
        images: ['images/page1.jpg']
      },
      {
        label: 'Pages 2 and 3',
        mode: 'spread',
        width: 'min(92vw, 920px)',
        height: 'min(82vh, 680px)',
        images: ['images/page2.jpg', 'images/page3.jpg']
      },
      {
        label: 'Page 4',
        mode: 'single',
        width: 'min(46vw, 460px)',
        height: 'min(82vh, 680px)',
        images: ['images/page4.jpg']
      }
    ];

    const stage = document.getElementById('stage');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const bookWrap = document.getElementById('bookWrap');

    let currentView = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;
    let animating = false;

    function buildSheet(view) {
      if (view.mode === 'single') {
        return `
          <div class="sheet single">
            <div class="panel">
              <img src="${view.images[0]}" alt="${view.label}">
            </div>
          </div>
        `;
      }

      return `
        <div class="sheet spread">
          <div class="panel">
            <img src="${view.images[0]}" alt="${view.label} left">
          </div>
          <div class="panel">
            <img src="${view.images[1]}" alt="${view.label} right">
          </div>
        </div>
      `;
    }

    function setStageSize(view) {
      stage.style.width = view.width;
      stage.style.height = view.height;
    }

    function render(animationClass = '') {
      const view = views[currentView];
      setStageSize(view);
      stage.innerHTML = `
        <div class="card ${animationClass}" id="card">
          ${buildSheet(view)}
        </div>
      `;
      pageCount.textContent = view.label;
    }

    function animateTo(targetIndex, direction) {
      if (animating || targetIndex < 0 || targetIndex >= views.length) return;
      animating = true;

      const currentCard = stage.querySelector('.card');
      if (currentCard) {
        currentCard.classList.add(direction === 'next' ? 'turn-next' : 'turn-prev');
      }

      setTimeout(() => {
        currentView = targetIndex;
        render(direction === 'next' ? 'turn-next' : 'turn-prev');
      }, 430);

      setTimeout(() => {
        animating = false;
      }, 940);
    }

    function goNext() {
      animateTo(currentView + 1, 'next');
    }

    function goPrev() {
      animateTo(currentView - 1, 'prev');
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function onPointerDown(e) {
      tryStartMusic();
      startX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      currentX = startX;
      isDragging = true;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      currentX = e.clientX ?? e.touches?.[0]?.clientX ?? currentX;
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = Math.max(60, bookWrap.clientWidth * 0.14);

      if (deltaX < -threshold) {
        goNext();
      } else if (deltaX > threshold) {
        goPrev();
      }
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    bookWrap.addEventListener('pointerdown', onPointerDown);
    bookWrap.addEventListener('pointermove', onPointerMove);
    bookWrap.addEventListener('pointerup', onPointerUp);
    bookWrap.addEventListener('pointercancel', onPointerUp);
    bookWrap.addEventListener('pointerleave', onPointerUp);

    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

    render();
  </script>
</body>
</html>
