<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Turner</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: radial-gradient(circle at center, #3d2b1f 0%, #1a120d 60%, #0b0705 100%);
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .book-wrap {
      width: min(94vw, 980px);
      height: min(88vh, 720px);
      perspective: 2400px;
      position: relative;
    }

    .book-shadow {
      position: absolute;
      inset: auto 10% 2% 10%;
      height: 22px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      filter: blur(14px);
      z-index: 0;
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      z-index: 1;
    }

    .sheet {
      position: absolute;
      inset: 0;
      transform-origin: center center;
      transform-style: preserve-3d;
      transition: transform 0.95s cubic-bezier(0.22, 0.8, 0.2, 1), opacity 0.95s ease;
      border-radius: 22px;
    }

    .sheet.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .sheet.turn-next {
      transform: rotateY(-180deg);
      opacity: 0;
    }

    .sheet.turn-prev {
      transform: rotateY(180deg);
      opacity: 0;
    }

    .spread {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-radius: 22px;
      overflow: hidden;
      background: #f2e8db;
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .spread::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(90,55,30,0.08), rgba(40,20,8,0.25), rgba(90,55,30,0.08));
      z-index: 3;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: #f8f1e7;
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .panel.empty {
      background: linear-gradient(135deg, #f4eadb 0%, #eadbc8 100%);
    }

    .greeting {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.28);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0.9;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .controls {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 25;
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.14);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.22);
    }

    .page-count {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 25;
      background: rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 780px) {
      .book-wrap {
        width: 95vw;
        height: 72vh;
      }

      .greeting, .hint, .page-count, button {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="greeting">Welcome, swipe left for next, swipe right for previous</div>
    <div class="page-count" id="pageCount">Page 1</div>
    <div class="controls">
      <button id="musicBtn">Pause music</button>
    </div>
    <div class="book-wrap" id="bookWrap">
      <div class="book-shadow"></div>
      <div class="book" id="book"></div>
    </div>
    <div class="hint">Cover, middle spread, then final page</div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const views = [
      {
        label: 'Page 1',
        left: 'images/page1.jpg',
        right: null
      },
      {
        label: 'Pages 2 and 3',
        left: 'images/page2.jpg',
        right: 'images/page3.jpg'
      },
      {
        label: 'Page 4',
        left: 'images/page4.jpg',
        right: null
      }
    ];

    const book = document.getElementById('book');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const bookWrap = document.getElementById('bookWrap');

    let currentView = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function createPanel(imageSrc, altText) {
      const panel = document.createElement('div');
      panel.className = imageSrc ? 'panel' : 'panel empty';
      if (imageSrc) {
        const img = document.createElement('img');
        img.src = imageSrc;
        img.alt = altText;
        panel.appendChild(img);
      }
      return panel;
    }

    function buildBook() {
      book.innerHTML = '';
      views.forEach((view, index) => {
        const sheet = document.createElement('div');
        sheet.className = 'sheet';
        sheet.dataset.index = index;
        sheet.style.zIndex = views.length - index;

        const spread = document.createElement('div');
        spread.className = 'spread';
        spread.appendChild(createPanel(view.left, `${view.label} left`));
        spread.appendChild(createPanel(view.right, `${view.label} right`));

        sheet.appendChild(spread);
        book.appendChild(sheet);
      });
      render();
    }

    function render(direction = 'next') {
      const sheets = [...document.querySelectorAll('.sheet')];
      sheets.forEach((sheet, index) => {
        sheet.classList.remove('turn-next', 'turn-prev', 'hidden');

        if (index < currentView) {
          sheet.classList.add(direction === 'prev' ? 'hidden' : 'turn-next');
        } else if (index > currentView) {
          sheet.classList.add(direction === 'next' ? 'hidden' : 'turn-prev');
        }
      });

      pageCount.textContent = views[currentView].label;
    }

    function nextView() {
      if (currentView < views.length - 1) {
        currentView += 1;
        render('next');
      }
    }

    function prevView() {
      if (currentView > 0) {
        currentView -= 1;
        render('prev');
      }
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function onPointerDown(e) {
      tryStartMusic();
      startX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      currentX = startX;
      isDragging = true;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      currentX = e.clientX ?? e.touches?.[0]?.clientX ?? currentX;
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = Math.max(60, bookWrap.clientWidth * 0.14);

      if (deltaX < -threshold) {
        nextView();
      } else if (deltaX > threshold) {
        prevView();
      }
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    ['pointerdown'].forEach(evt => bookWrap.addEventListener(evt, onPointerDown));
    ['pointermove'].forEach(evt => bookWrap.addEventListener(evt, onPointerMove));
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(evt => bookWrap.addEventListener(evt, onPointerUp));

    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

    buildBook();
  </script>
</body>
</html>
