<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Viewer V3</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: radial-gradient(circle at center, #3d2b1f 0%, #1a120d 60%, #0b0705 100%);
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .top-pill,
    .bottom-pill,
    .side-pill,
    .music-btn {
      position: absolute;
      z-index: 30;
      background: rgba(0,0,0,0.34);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      padding: 10px 14px;
    }

    .top-pill {
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
    }

    .bottom-pill {
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
    }

    .side-pill {
      top: 18px;
      left: 18px;
    }

    .music-btn {
      top: 18px;
      right: 18px;
      cursor: pointer;
    }

    .viewer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2400px;
    }

    .shadow {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      filter: blur(16px);
      z-index: 1;
    }

    .frame {
      position: relative;
      z-index: 2;
      transition: width 0.45s ease, height 0.45s ease;
      transform-style: preserve-3d;
    }

    .page-surface,
    .flip-layer {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      overflow: hidden;
      background: #f6efe6;
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .page-surface.single,
    .flip-layer.single {
      display: block;
    }

    .page-surface.spread,
    .flip-layer.spread {
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    .page-surface.spread::before,
    .flip-layer.spread::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(90,55,30,0.06), rgba(40,20,8,0.26), rgba(90,55,30,0.06));
      z-index: 5;
    }

    .panel {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8f1e7;
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .flip-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      transform-origin: left center;
      backface-visibility: hidden;
    }

    .flip-next {
      animation: flipNext 0.85s cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    .flip-prev {
      animation: flipPrev 0.85s cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    @keyframes flipNext {
      0% { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(-180deg); opacity: 0; }
    }

    @keyframes flipPrev {
      0% { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(180deg); opacity: 0; }
    }

    @media (max-width: 780px) {
      .top-pill,
      .bottom-pill,
      .side-pill,
      .music-btn {
        font-size: 12px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-pill">Version 3, swipe left and right</div>
    <div class="side-pill" id="pageLabel">Page 1</div>
    <button class="music-btn" id="musicBtn">Pause music</button>
    <div class="viewer" id="viewer">
      <div class="shadow"></div>
      <div class="frame" id="frame"></div>
    </div>
    <div class="bottom-pill">Only 3 states, 1, then 2 and 3, then 4</div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const states = [
      {
        label: 'Page 1',
        mode: 'single',
        width: Math.min(window.innerWidth * 0.46, 460),
        height: Math.min(window.innerHeight * 0.82, 680),
        images: ['images/page1.jpg']
      },
      {
        label: 'Pages 2 and 3',
        mode: 'spread',
        width: Math.min(window.innerWidth * 0.92, 920),
        height: Math.min(window.innerHeight * 0.82, 680),
        images: ['images/page2.jpg', 'images/page3.jpg']
      },
      {
        label: 'Page 4',
        mode: 'single',
        width: Math.min(window.innerWidth * 0.46, 460),
        height: Math.min(window.innerHeight * 0.82, 680),
        images: ['images/page4.jpg']
      }
    ];

    const frame = document.getElementById('frame');
    const viewer = document.getElementById('viewer');
    const pageLabel = document.getElementById('pageLabel');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    let index = 0;
    let startX = 0;
    let currentX = 0;
    let dragging = false;
    let animating = false;

    function recalcSizes() {
      states[0].width = Math.min(window.innerWidth * 0.46, 460);
      states[0].height = Math.min(window.innerHeight * 0.82, 680);
      states[1].width = Math.min(window.innerWidth * 0.92, 920);
      states[1].height = Math.min(window.innerHeight * 0.82, 680);
      states[2].width = Math.min(window.innerWidth * 0.46, 460);
      states[2].height = Math.min(window.innerHeight * 0.82, 680);
      applyFrameSize(states[index]);
    }

    function surfaceHTML(state) {
      if (state.mode === 'single') {
        return `
          <div class="page-surface single">
            <div class="panel"><img src="${state.images[0]}" alt="${state.label}"></div>
          </div>
        `;
      }

      return `
        <div class="page-surface spread">
          <div class="panel"><img src="${state.images[0]}" alt="Page 2"></div>
          <div class="panel"><img src="${state.images[1]}" alt="Page 3"></div>
        </div>
      `;
    }

    function flipHTML(state, extraClass = '') {
      if (state.mode === 'single') {
        return `
          <div class="flip-layer single ${extraClass}">
            <div class="panel"><img src="${state.images[0]}" alt="${state.label}"></div>
          </div>
        `;
      }

      return `
        <div class="flip-layer spread ${extraClass}">
          <div class="panel"><img src="${state.images[0]}" alt="Page 2"></div>
          <div class="panel"><img src="${state.images[1]}" alt="Page 3"></div>
        </div>
      `;
    }

    function applyFrameSize(state) {
      frame.style.width = `${state.width}px`;
      frame.style.height = `${state.height}px`;
    }

    function renderCurrent() {
      const state = states[index];
      applyFrameSize(state);
      frame.innerHTML = surfaceHTML(state);
      pageLabel.textContent = state.label;
    }

    function transitionTo(nextIndex, direction) {
      if (animating || nextIndex < 0 || nextIndex >= states.length) return;
      animating = true;

      const outgoing = states[index];
      const incoming = states[nextIndex];
      const flipClass = direction === 'next' ? 'flip-next' : 'flip-prev';

      applyFrameSize(incoming);
      frame.innerHTML = surfaceHTML(incoming) + flipHTML(outgoing, flipClass);
      pageLabel.textContent = incoming.label;
      index = nextIndex;

      setTimeout(() => {
        frame.innerHTML = surfaceHTML(states[index]);
        animating = false;
      }, 860);
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function onDown(e) {
      tryStartMusic();
      dragging = true;
      startX = e.clientX || 0;
      currentX = startX;
    }

    function onMove(e) {
      if (!dragging) return;
      currentX = e.clientX || currentX;
    }

    function onUp() {
      if (!dragging) return;
      dragging = false;
      const delta = currentX - startX;
      const threshold = Math.max(60, viewer.clientWidth * 0.12);

      if (delta < -threshold) {
        transitionTo(index + 1, 'next');
      } else if (delta > threshold) {
        transitionTo(index - 1, 'prev');
      }
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    viewer.addEventListener('pointerdown', onDown);
    viewer.addEventListener('pointermove', onMove);
    viewer.addEventListener('pointerup', onUp);
    viewer.addEventListener('pointercancel', onUp);
    viewer.addEventListener('pointerleave', onUp);
    document.addEventListener('click', tryStartMusic, { once: true });
    window.addEventListener('resize', recalcSizes);

    renderCurrent();
  </script>
</body>
</html>
