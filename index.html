<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Turner</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: radial-gradient(circle at center, #3d2b1f 0%, #1a120d 60%, #0b0705 100%);
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .book-wrap {
      width: min(94vw, 980px);
      height: min(88vh, 720px);
      position: relative;
      perspective: 1800px;
    }

    .book-shadow {
      position: absolute;
      inset: auto 10% 2% 10%;
      height: 22px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      filter: blur(14px);
      z-index: 0;
    }

    .book-stage {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
      transform-style: preserve-3d;
    }

    .spread {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 22px;
      overflow: hidden;
      background: #f2e8db;
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      transform-origin: center center;
    }

    .spread::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(90,55,30,0.08), rgba(40,20,8,0.25), rgba(90,55,30,0.08));
      z-index: 3;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: #f8f1e7;
    }

    .panel.empty {
      background: linear-gradient(135deg, #f4eadb 0%, #eadbc8 100%);
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .animate-next {
      animation: flipNext 0.75s ease;
    }

    .animate-prev {
      animation: flipPrev 0.75s ease;
    }

    @keyframes flipNext {
      0% { transform: rotateY(0deg) scale(1); opacity: 1; }
      49% { transform: rotateY(-90deg) scale(0.98); opacity: 0.88; }
      50% { transform: rotateY(90deg) scale(0.98); opacity: 0.88; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    @keyframes flipPrev {
      0% { transform: rotateY(0deg) scale(1); opacity: 1; }
      49% { transform: rotateY(90deg) scale(0.98); opacity: 0.88; }
      50% { transform: rotateY(-90deg) scale(0.98); opacity: 0.88; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .greeting {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.3px;
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.28);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0.9;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .controls {
      position: absolute;
      right: 18px;
      top: 18px;
      z-index: 25;
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.14);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.22);
    }

    .page-count {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 25;
      background: rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 780px) {
      .book-wrap {
        width: 95vw;
        height: 72vh;
      }

      .greeting, .hint, .page-count, button {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="greeting">Welcome, swipe left for next, swipe right for previous</div>
    <div class="page-count" id="pageCount">Page 1</div>
    <div class="controls">
      <button id="musicBtn">Pause music</button>
    </div>
    <div class="book-wrap" id="bookWrap">
      <div class="book-shadow"></div>
      <div class="book-stage" id="bookStage"></div>
    </div>
    <div class="hint">Page 1, then 2 and 3 together, then page 4</div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const views = [
      {
        label: 'Page 1',
        left: 'images/page1.jpg',
        right: null
      },
      {
        label: 'Pages 2 and 3',
        left: 'images/page2.jpg',
        right: 'images/page3.jpg'
      },
      {
        label: 'Page 4',
        left: 'images/page4.jpg',
        right: null
      }
    ];

    const bookStage = document.getElementById('bookStage');
    const pageCount = document.getElementById('pageCount');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const bookWrap = document.getElementById('bookWrap');

    let currentView = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;
    let animating = false;

    function panelMarkup(src, alt) {
      if (!src) {
        return '<div class="panel empty"></div>';
      }
      return `<div class="panel"><img src="${src}" alt="${alt}"></div>`;
    }

    function renderView(animationClass = '') {
      const view = views[currentView];
      bookStage.innerHTML = `
        <div class="spread ${animationClass}" id="activeSpread">
          ${panelMarkup(view.left, `${view.label} left`)}
          ${panelMarkup(view.right, `${view.label} right`)}
        </div>
      `;
      pageCount.textContent = view.label;
    }

    function goNext() {
      if (animating || currentView >= views.length - 1) return;
      currentView += 1;
      animating = true;
      renderView('animate-next');
      setTimeout(() => { animating = false; }, 780);
    }

    function goPrev() {
      if (animating || currentView <= 0) return;
      currentView -= 1;
      animating = true;
      renderView('animate-prev');
      setTimeout(() => { animating = false; }, 780);
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function onPointerDown(e) {
      tryStartMusic();
      startX = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      currentX = startX;
      isDragging = true;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      currentX = e.clientX ?? e.touches?.[0]?.clientX ?? currentX;
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false;
      const deltaX = currentX - startX;
      const threshold = Math.max(60, bookWrap.clientWidth * 0.14);

      if (deltaX < -threshold) {
        goNext();
      } else if (deltaX > threshold) {
        goPrev();
      }
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    bookWrap.addEventListener('pointerdown', onPointerDown);
    bookWrap.addEventListener('pointermove', onPointerMove);
    bookWrap.addEventListener('pointerup', onPointerUp);
    bookWrap.addEventListener('pointercancel', onPointerUp);
    bookWrap.addEventListener('pointerleave', onPointerUp);

    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

    renderView();
  </script>
</body>
</html>
