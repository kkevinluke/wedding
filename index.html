<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobile Page Viewer</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #120c08;
      font-family: Georgia, serif;
      touch-action: pan-y;
    }

    body {
      color: #fff;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(90, 58, 35, 0.35), transparent 45%),
        linear-gradient(180deg, #2a1c14 0%, #120c08 100%);
    }

    .topbar {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .pill,
    .music-btn {
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1;
    }

    .music-btn {
      cursor: pointer;
    }

    .viewer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(max(64px, env(safe-area-inset-top) + 52px))
        14px
        calc(max(72px, env(safe-area-inset-bottom) + 56px));
      perspective: 1800px;
    }

    .frame {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: min(92vw, 460px);
      height: min(78dvh, 760px);
      border-radius: 24px;
      overflow: hidden;
      background: #f6efe6;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .page,
    .flip-layer {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #f6efe6;
      overflow: hidden;
      border-radius: 24px;
    }

    .page img,
    .flip-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #f6efe6;
      display: block;
      pointer-events: none;
    }

    .flip-layer {
      z-index: 5;
      transform-origin: left center;
      backface-visibility: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.18);
    }

    .flip-next {
      animation: flipNext 0.65s cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    .flip-prev {
      transform-origin: right center;
      animation: flipPrev 0.65s cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    @keyframes flipNext {
      0% { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(-160deg); opacity: 0; }
    }

    @keyframes flipPrev {
      0% { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(160deg); opacity: 0; }
    }

    .bottombar {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 20;
      display: flex;
      justify-content: center;
    }

    .hint {
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 380px) {
      .pill,
      .music-btn,
      .hint {
        font-size: 11px;
        padding: 9px 12px;
      }

      .frame {
        width: 94vw;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="pill" id="pageLabel">Page 1 of 4</div>
      <button class="music-btn" id="musicBtn">Pause music</button>
    </div>

    <div class="viewer" id="viewer">
      <div class="frame" id="frame"></div>
    </div>

    <div class="bottombar">
      <div class="hint">Swipe left for next, swipe right for previous</div>
    </div>
  </div>

  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const pages = [
      'images/page1.jpg',
      'images/page2.jpg',
      'images/page3.jpg',
      'images/page4.jpg'
    ];

    const frame = document.getElementById('frame');
    const viewer = document.getElementById('viewer');
    const pageLabel = document.getElementById('pageLabel');
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    let currentIndex = 0;
    let startX = 0;
    let currentX = 0;
    let dragging = false;
    let animating = false;

    function pageHTML(src, className = 'page') {
      return `
        <div class="${className}">
          <img src="${src}" alt="Page image">
        </div>
      `;
    }

    function renderCurrent() {
      frame.innerHTML = pageHTML(pages[currentIndex], 'page');
      pageLabel.textContent = `Page ${currentIndex + 1} of ${pages.length}`;
    }

    function transitionTo(nextIndex, direction) {
      if (animating || nextIndex < 0 || nextIndex >= pages.length) return;
      animating = true;

      const outgoing = pages[currentIndex];
      const incoming = pages[nextIndex];
      const flipClass = direction === 'next' ? 'flip-next' : 'flip-prev';

      frame.innerHTML = pageHTML(incoming, 'page') + pageHTML(outgoing, `flip-layer ${flipClass}`);
      currentIndex = nextIndex;
      pageLabel.textContent = `Page ${currentIndex + 1} of ${pages.length}`;

      setTimeout(() => {
        renderCurrent();
        animating = false;
      }, 680);
    }

    function tryStartMusic() {
      music.play().catch(() => {});
    }

    function onDown(e) {
      tryStartMusic();
      dragging = true;
      startX = e.clientX || 0;
      currentX = startX;
    }

    function onMove(e) {
      if (!dragging) return;
      currentX = e.clientX || currentX;
    }

    function onUp() {
      if (!dragging) return;
      dragging = false;
      const delta = currentX - startX;
      const threshold = Math.max(45, viewer.clientWidth * 0.12);

      if (delta < -threshold) {
        transitionTo(currentIndex + 1, 'next');
      } else if (delta > threshold) {
        transitionTo(currentIndex - 1, 'prev');
      }
    }

    musicBtn.addEventListener('click', () => {
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.textContent = 'Pause music';
      } else {
        music.pause();
        musicBtn.textContent = 'Play music';
      }
    });

    viewer.addEventListener('pointerdown', onDown);
    viewer.addEventListener('pointermove', onMove);
    viewer.addEventListener('pointerup', onUp);
    viewer.addEventListener('pointercancel', onUp);
    viewer.addEventListener('pointerleave', onUp);

    document.addEventListener('click', tryStartMusic, { once: true });
    document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

    renderCurrent();
  </script>
</body>
</html>
